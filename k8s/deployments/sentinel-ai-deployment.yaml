apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-ai
  namespace: sentinelops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentinel-ai
  template:
    metadata:
      labels:
        app: sentinel-ai
    spec:
      containers:
      - name: sentinel-ai
        image: sentinelops/sentinel-ai:latest
        ports:
        - containerPort: 8000