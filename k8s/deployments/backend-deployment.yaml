---
# =============================================================================
# SentinelOps AI – Backend Deployment
# Node.js/Express API server
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinelops-backend
  namespace: sentinelops
  labels:
    app: sentinelops-backend
    component: backend
    part-of: sentinelops-ai
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: sentinelops-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: sentinelops-backend
        component: backend
        part-of: sentinelops-ai
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: sentinelops-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      terminationGracePeriodSeconds: 30
      containers:
        - name: backend
          image: sentinelops/backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "5000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sentinelops-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sentinelops-secrets
                  key: jwt-secret
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: sentinelops-secrets
                  key: jwt-refresh-secret
            - name: AI_SERVICE_URL
              value: "http://sentinel-ai:8000"
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: sentinelops-config
                  key: cors-origin
            - name: LOG_LEVEL
              value: "info"
            - name: SWAGGER_ENABLED
              value: "false"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sentinelops-backend
  namespace: sentinelops
  labels:
    app: sentinelops-backend
