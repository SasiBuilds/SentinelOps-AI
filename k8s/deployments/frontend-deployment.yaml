---
# =============================================================================
# SentinelOps AI – Frontend Deployment
# Static dashboard served via nginx
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinelops-frontend
  namespace: sentinelops
  labels:
    app: sentinelops-frontend
    component: frontend
    part-of: sentinelops-ai
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: sentinelops-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: sentinelops-frontend
        component: frontend
        part-of: sentinelops-ai
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101   # nginx user in nginx:alpine
        fsGroup: 101
      terminationGracePeriodSeconds: 10
      containers:
        - name: frontend
          image: vishnukantheti/sentinelops-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-tmp
              mountPath: /tmp
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
