apiVersion: v1
kind: Service
metadata:
  name: sentinelops-backend
  namespace: sentinelops
  labels:
    app: sentinelops-backend
    component: backend
    part-of: sentinelops-ai
spec:
  type: ClusterIP
  selector:
    app: sentinelops-backend
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      protocol: TCP
