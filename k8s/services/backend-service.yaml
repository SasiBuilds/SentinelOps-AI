---
# =============================================================================
# SentinelOps AI – Backend Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: sentinelops-backend
  namespace: sentinelops
  labels:
    app: sentinelops-backend
    component: backend
    part-of: sentinelops-ai
spec:
  type: ClusterIP
  selector:
    app: sentinelops-backend
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      protocol: TCP
---
# ── Sentinel-AI (Python FastAPI) service ──────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: sentinel-ai
  namespace: sentinelops
  labels:
    app: sentinel-ai
    component: ai-engine
    part-of: sentinelops-ai
spec:
  type: ClusterIP
  selector:
    app: sentinel-ai
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
---
# ── Sentinel-AI Deployment ────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-ai
  namespace: sentinelops
  labels:
    app: sentinel-ai
    component: ai-engine
    part-of: sentinelops-ai
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: sentinel-ai
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: sentinel-ai
        component: ai-engine
        part-of: sentinelops-ai
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 15
      containers:
        - name: sentinel-ai
          image: sentinelops/sentinel-ai:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: LOG_LEVEL
              value: "INFO"
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "400m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: incidents-data
              mountPath: /app/../docs
      volumes:
        - name: incidents-data
          persistentVolumeClaim:
            claimName: sentinelops-incidents-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sentinelops-incidents-pvc
  namespace: sentinelops
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
