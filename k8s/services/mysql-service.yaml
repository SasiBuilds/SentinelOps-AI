---
# =============================================================================
# SentinelOps AI – PostgreSQL Service (headless for StatefulSet + regular)
# =============================================================================

# Headless service for StatefulSet DNS resolution
apiVersion: v1
kind: Service
metadata:
  name: sentinelops-postgres
  namespace: sentinelops
  labels:
    app: sentinelops-postgres
    component: database
    part-of: sentinelops-ai
spec:
  clusterIP: None   # headless
  selector:
    app: sentinelops-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
---
# Regular service for application connections
apiVersion: v1
kind: Service
metadata:
  name: sentinelops-postgres-svc
  namespace: sentinelops
  labels:
    app: sentinelops-postgres
    component: database
    part-of: sentinelops-ai
spec:
  type: ClusterIP
  selector:
    app: sentinelops-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
---
# ── NetworkPolicy – restrict DB access ───────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sentinelops-postgres-netpol
  namespace: sentinelops
spec:
  podSelector:
    matchLabels:
      app: sentinelops-postgres
  policyTypes:
    - Ingress
  ingress:
    # Only the backend pods may connect to PostgreSQL
    - from:
        - podSelector:
            matchLabels:
              app: sentinelops-backend
      ports:
        - protocol: TCP
          port: 5432
