apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sentinelops-backend
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: sentinelops-backend
  namespaceSelector:
    matchNames:
      - sentinelops
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
