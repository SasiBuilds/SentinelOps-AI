---
# =============================================================================
# SentinelOps AI – Alertmanager Configuration
# Routes Prometheus alerts to the SentinelOps AI webhook and notification
# channels (Slack / PagerDuty).
#
# Secrets (slack_api_url, pagerduty_routing_key) should be injected via
# Kubernetes Secrets or environment variable substitution – never committed.
# =============================================================================

global:
  # Default resolve timeout – how long Alertmanager waits before marking
  # a firing alert as resolved when it stops being reported.
  resolve_timeout: 5m

  # Optional: default SMTP configuration for email notifications
  # smtp_smarthost: 'smtp.example.com:587'
  # smtp_from: 'alertmanager@sentinelops.io'
  # smtp_auth_username: 'alertmanager@sentinelops.io'
  # smtp_auth_password_file: /etc/alertmanager/smtp_password

# ── Templates ──────────────────────────────────────────────────────────────
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# ── Routing tree ───────────────────────────────────────────────────────────
route:
  # Root receiver – catches anything not matched by a child route
  receiver: sentinelops-webhook

  # Group alerts by cluster + alertname so related alerts fire together
  group_by: ['alertname', 'namespace', 'service']
  group_wait:      30s   # Wait before sending first notification for a group
  group_interval:  5m    # Wait before sending updated notifications
  repeat_interval: 4h    # Repeat notification if alert is still firing

  routes:

    # ── Critical alerts → PagerDuty + webhook ──────────────────────────────
    - match:
        severity: critical
      receiver: pagerduty-critical
      continue: true   # also send to the root receiver (webhook)
      group_wait:     10s
      repeat_interval: 1h

    # ── Warning alerts → Slack ─────────────────────────────────────────────
    - match:
        severity: warning
      receiver: slack-warnings
      group_wait:     60s
      repeat_interval: 6h

    # ── Platform team watchdog ─────────────────────────────────────────────
    - match:
        team: platform
      receiver: sentinelops-webhook

    # ── Silenced / informational ───────────────────────────────────────────
    - match:
        severity: none
      receiver: null-receiver

# ── Inhibition rules ───────────────────────────────────────────────────────
inhibit_rules:
  # If a node is NotReady, suppress pod-level alerts on that node
  - source_match:
      alertname: NodeNotReady
    target_match_re:
      alertname: 'Pod.*|OOMKilled|ImagePullBackOff'
    equal: ['node']

  # If the backend is completely down, suppress latency / error-rate alerts
  - source_match:
      alertname: BackendDown
    target_match_re:
      alertname: 'HighHTTPErrorRate|HighP99Latency'
    equal: ['service']

# ── Receivers ──────────────────────────────────────────────────────────────
receivers:

  # ── SentinelOps AI webhook ─────────────────────────────────────────────
  # This is the primary integration point: Alertmanager POSTs to the
  # sentinel-ai FastAPI service which then triggers automated recovery.
  - name: sentinelops-webhook
    webhook_configs:
      - url: 'http://sentinel-ai:8000/alert'
        send_resolved: true
        http_config:
          # Uncomment to add bearer token authentication
          # bearer_token_file: /etc/alertmanager/webhook_token
          follow_redirects: true
        # Map Alertmanager labels to the sentinel-ai AlertPayload schema
        # (alert body is sent as JSON by Alertmanager v0.26+)
        max_alerts: 10

  # ── PagerDuty ──────────────────────────────────────────────────────────
  - name: pagerduty-critical
    pagerduty_configs:
      - routing_key_file: /etc/alertmanager/pagerduty_routing_key
        severity: '{{ if eq .GroupLabels.severity "critical" }}critical{{ else }}warning{{ end }}'
        description: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
        details:
          firing:      '{{ .Alerts.Firing | len }}'
          resolved:    '{{ .Alerts.Resolved | len }}'
          instance:    '{{ .GroupLabels.instance }}'
          namespace:   '{{ .GroupLabels.namespace }}'

  # ── Slack ──────────────────────────────────────────────────────────────
  - name: slack-warnings
    slack_configs:
      - api_url_file: /etc/alertmanager/slack_api_url
        channel: '#sentinelops-alerts'
        send_resolved: true
        icon_emoji: ':sentinel:'
        username: 'SentinelOps Alertmanager'
        title: >-
          {{ if eq .Status "firing" }}🔥{{ else }}✅{{ end }}
          [{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Details:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          *Namespace:* {{ .Labels.namespace | default "n/a" }}
          {{ end }}
        actions:
          - type: button
            text: 'View in Grafana'
            url: 'http://grafana:3000/d/sentinelops/sentinelops-ai?var-alertname={{ .GroupLabels.alertname }}'

  # ── Null receiver (silences) ───────────────────────────────────────────
  - name: null-receiver
