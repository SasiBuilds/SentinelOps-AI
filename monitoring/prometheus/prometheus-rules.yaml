---
# =============================================================================
# SentinelOps AI – Prometheus Alerting Rules
# Deploy with: kubectl apply -f prometheus-rules.yaml
# Or reference from prometheus.yml: rule_files: ["/etc/prometheus/rules/*.yaml"]
# =============================================================================

groups:

  # ── Kubernetes Pod Health ───────────────────────────────────────────────────
  - name: kubernetes.pod
    interval: 30s
    rules:

      - alert: PodCrashLooping
        expr: |
          rate(kube_pod_container_status_restarts_total[5m]) * 60 > 1
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash-looping"
          description: >
            Container {{ $labels.container }} in pod {{ $labels.pod }}
            (namespace {{ $labels.namespace }}) has restarted
            {{ $value | humanize }} times per minute over the last 5 minutes.
          runbook: "https://runbooks.sentinelops.io/pod-crash-looping"

      - alert: PodNotReady
        expr: |
          kube_pod_status_ready{condition="true"} == 0
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is not ready"
          description: >
            Pod {{ $labels.pod }} in namespace {{ $labels.namespace }}
            has been in a not-ready state for more than 5 minutes.

      - alert: OOMKilled
        expr: |
          kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Container OOMKilled: {{ $labels.namespace }}/{{ $labels.pod }}"
          description: >
            Container {{ $labels.container }} in pod {{ $labels.pod }}
            was OOMKilled. Consider increasing memory limits.

      - alert: ImagePullBackOff
        expr: |
          kube_pod_container_status_waiting_reason{reason=~"ImagePullBackOff|ErrImagePull"} == 1
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Image pull failure: {{ $labels.namespace }}/{{ $labels.pod }}"
          description: >
            Container {{ $labels.container }} in pod {{ $labels.pod }}
            cannot pull its image. Check registry credentials and image tag.

  # ── Kubernetes Deployment Health ────────────────────────────────────────────
  - name: kubernetes.deployment
    interval: 30s
    rules:

      - alert: DeploymentReplicasMismatch
        expr: |
          kube_deployment_spec_replicas != kube_deployment_status_available_replicas
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} replica mismatch"
          description: >
            Deployment {{ $labels.deployment }} in namespace {{ $labels.namespace }}
            has {{ $value }} available replicas but desires
            {{ $labels.desired }} replicas.

      - alert: DeploymentGenerationMismatch
        expr: |
          kube_deployment_status_observed_generation != kube_deployment_metadata_generation
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Deployment rollout stuck: {{ $labels.namespace }}/{{ $labels.deployment }}"
          description: >
            The deployment {{ $labels.deployment }} observed generation does not
            match the desired generation. Rollout may be stalled.

  # ── Kubernetes Node Health ──────────────────────────────────────────────────
  - name: kubernetes.node
    interval: 60s
    rules:

      - alert: NodeNotReady
        expr: kube_node_status_condition{condition="Ready",status="true"} == 0
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Node {{ $labels.node }} is not ready"
          description: >
            Node {{ $labels.node }} has been in NotReady state for over 5 minutes.

      - alert: NodeHighCPU
        expr: |
          (1 - avg by(node) (rate(node_cpu_seconds_total{mode="idle"}[5m]))) * 100 > 85
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High CPU usage on node {{ $labels.node }}: {{ $value | humanize }}%"
          description: "CPU usage on node {{ $labels.node }} has exceeded 85% for 10 minutes."

      - alert: NodeHighMemory
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High memory usage on node {{ $labels.node }}: {{ $value | humanize }}%"
          description: "Memory usage on node {{ $labels.node }} exceeds 85% for 10 minutes."

      - alert: NodeDiskPressure
        expr: |
          (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lxcfs"} /
                node_filesystem_size_bytes{fstype!~"tmpfs|fuse.lxcfs"})) * 100 > 80
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Disk pressure on {{ $labels.node }}: {{ $value | humanize }}% used"
          description: "Filesystem {{ $labels.mountpoint }} on {{ $labels.node }} is over 80% full."

  # ── SentinelOps Backend API ─────────────────────────────────────────────────
  - name: sentinelops.backend
    interval: 30s
    rules:

      - alert: BackendDown
        expr: up{job="sentinelops-backend"} == 0
        for: 2m
        labels:
          severity: critical
          service: backend
          team: platform
        annotations:
          summary: "SentinelOps backend is down"
          description: >
            The SentinelOps backend API has been unreachable for more than 2 minutes.

      - alert: HighHTTPErrorRate
        expr: |
          rate(http_requests_total{job="sentinelops-backend",status=~"5.."}[5m]) /
          rate(http_requests_total{job="sentinelops-backend"}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          service: backend
          team: platform
        annotations:
          summary: "High HTTP 5xx error rate on backend: {{ $value | humanizePercentage }}"
          description: "More than 5% of backend requests are returning 5xx errors."

      - alert: HighP99Latency
        expr: |
          histogram_quantile(0.99,
            rate(http_request_duration_seconds_bucket{job="sentinelops-backend"}[5m])
          ) > 2
        for: 5m
        labels:
          severity: warning
          service: backend
          team: platform
        annotations:
          summary: "High P99 latency on backend: {{ $value | humanizeDuration }}"
          description: "P99 request latency exceeds 2 seconds on the backend API."

  # ── SentinelOps AI Service ──────────────────────────────────────────────────
  - name: sentinelops.ai
    interval: 30s
    rules:

      - alert: AIServiceDown
        expr: up{job="sentinel-ai"} == 0
        for: 2m
        labels:
          severity: critical
          service: sentinel-ai
          team: platform
        annotations:
          summary: "Sentinel AI service is down"
          description: >
            The Python FastAPI AI analysis service has been unreachable for 2 minutes.
            Recovery automation is degraded.

      - alert: HighCPUUsage
        expr: |
          rate(process_cpu_seconds_total{job="sentinel-ai"}[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
          service: sentinel-ai
          team: platform
        annotations:
          summary: "High CPU on sentinel-ai: {{ $value | humanize }}%"
          description: "The sentinel-ai process CPU usage exceeds 80% for 5 minutes."
