---
# =============================================================================
# SentinelOps AI – Full Local Stack (docker-compose)
#
# Usage:
#   docker compose up --build          Start all services
#   docker compose up backend ai       Start specific services
#   docker compose down -v             Stop and remove volumes
#
# Services:
#   postgres      PostgreSQL 16
#   backend       Node.js/Express API  → http://localhost:5000
#   sentinel-ai   Python FastAPI AI    → http://localhost:8000
#   frontend      nginx static site    → http://localhost:3000
#   prometheus    Metrics scraping     → http://localhost:9090
#   alertmanager  Alert routing        → http://localhost:9093
#   grafana       Dashboards           → http://localhost:3001
# =============================================================================

name: sentinelops-ai

x-common-env: &common-env
  TZ: UTC

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sentinelops-postgres
    restart: unless-stopped
    environment:
      <<: *common-env
      POSTGRES_USER: sentinelops
      POSTGRES_PASSWORD: sentinelops_dev_password
      POSTGRES_DB: sentinelops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinelops -d sentinelops"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sentinelops-net

  # ── Database migrations (run-once job) ──────────────────────────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentinelops-migrate
    command: ["sh", "-c", "npx prisma migrate deploy && echo 'Migrations complete'"]
    environment:
      <<: *common-env
      NODE_ENV: development
      DATABASE_URL: "postgresql://sentinelops:sentinelops_dev_password@postgres:5432/sentinelops?schema=public"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sentinelops-net
    restart: "no"

  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentinelops-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      <<: *common-env
      NODE_ENV: development
      PORT: "5000"
      DATABASE_URL: "postgresql://sentinelops:sentinelops_dev_password@postgres:5432/sentinelops?schema=public"
      JWT_SECRET: dev_jwt_secret_change_in_production_use_64_chars
      JWT_EXPIRES_IN: "15m"
      JWT_REFRESH_SECRET: dev_refresh_secret_change_in_production_use_64_chars
      JWT_REFRESH_EXPIRES_IN: "7d"
      CORS_ORIGIN: "http://localhost:3000"
      AI_SERVICE_URL: "http://sentinel-ai:8000"
      AI_SERVICE_TIMEOUT_MS: "10000"
      LOG_LEVEL: debug
      SWAGGER_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - sentinelops-net

  # ── Sentinel-AI (Python FastAPI) ────────────────────────────────────────────
  sentinel-ai:
    build:
      context: .
      dockerfile: ./sentinel-ai/Dockerfile
    container_name: sentinelops-sentinel-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      <<: *common-env
      LOG_LEVEL: INFO
      CORS_ORIGINS: "http://localhost:5000,http://localhost:3000"
      INCIDENTS_FILE: /data/incidents.json
    volumes:
      - incidents_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - sentinelops-net

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sentinelops-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - sentinelops-net

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: sentinelops-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/prometheus-rules.yaml:/etc/prometheus/rules/sentinelops.yaml:ro
      - prometheus_data:/prometheus
    networks:
      - sentinelops-net

  # ── Alertmanager ────────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: sentinelops-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yaml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yaml:/etc/alertmanager/alertmanager.yaml:ro
      - alertmanager_data:/alertmanager
    networks:
      - sentinelops-net

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    container_name: sentinelops-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      <<: *common-env
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: sentinelops_grafana
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3001"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboard.json:/var/lib/grafana/dashboards/sentinelops.json:ro
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - sentinelops-net

# ── Networks ────────────────────────────────────────────────────────────────
networks:
  sentinelops-net:
    driver: bridge
    name: sentinelops-net

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    name: sentinelops-postgres-data
  incidents_data:
    name: sentinelops-incidents-data
  backend_logs:
    name: sentinelops-backend-logs
  prometheus_data:
    name: sentinelops-prometheus-data
  alertmanager_data:
    name: sentinelops-alertmanager-data
  grafana_data:
    name: sentinelops-grafana-data
