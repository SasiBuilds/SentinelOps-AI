# =============================================================================
# ci.yml – Continuous Integration
#
# Runs on every push and pull_request targeting the main branch.
# Executes two parallel jobs:
#   1. frontend  – Node 20, ESLint, Vite build
#   2. sentinel-ai – Python 3.13, flake8 lint, pytest, import smoke-test
#
# A third job, `ci-status`, aggregates both results so downstream workflows
# (cd.yml, docker-build.yml) can depend on a single gating job.
# =============================================================================

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Cancel any in-flight run for the same ref so stale runs don't block merges.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1 – Frontend (React 19 + Vite 8 + Tailwind 4)
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend – Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        # All steps inside this job run from the frontend directory.
        working-directory: frontend

    steps:
      # -----------------------------------------------------------------------
      # Step 1 – Checkout
      # Checks out the full repository at the triggering commit.
      # fetch-depth: 0 gives git blame and changelog tools full history;
      # using 1 here is fine for pure CI.
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Step 2 – Set up Node.js 20
      # Pins the exact LTS version used by the backend Dockerfile so CI and
      # production share identical runtime behaviour.
      # cache: 'npm' stores ~/.npm between runs; restores when package-lock.json
      # has not changed, shaving ~30-60 s off typical runs.
      # -----------------------------------------------------------------------
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # -----------------------------------------------------------------------
      # Step 3 – Install dependencies
      # `npm ci` performs a clean install from package-lock.json.
      # Unlike `npm install` it never mutates the lockfile and fails fast when
      # it is out of sync with package.json – exactly what you want in CI.
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: npm ci

      # -----------------------------------------------------------------------
      # Step 4 – Lint
      # Runs ESLint via the project's own `lint` script (defined in
      # package.json as `eslint .`).
      # The `--max-warnings 0` flag treats every warning as a build failure,
      # enforcing zero-warning policy consistently across environments.
      # -----------------------------------------------------------------------
      - name: Run ESLint
        run: npm run lint -- --max-warnings 0

      # -----------------------------------------------------------------------
      # Step 5 – Build
      # Runs `vite build`, which compiles JSX → JS, bundles assets, and
      # emits the production artefact to frontend/dist/.
      # A non-zero exit code (import errors, missing env vars, etc.) fails
      # the job immediately.
      # -----------------------------------------------------------------------
      - name: Build (Vite production bundle)
        run: npm run build

      # -----------------------------------------------------------------------
      # Step 6 – Upload build artefact
      # Uploads frontend/dist/ so the docker-build job can download it instead
      # of re-running the build.  Retention is 7 days (sufficient for PR work).
      # -----------------------------------------------------------------------
      - name: Upload dist artefact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ---------------------------------------------------------------------------
  # JOB 2 – Sentinel-AI (Python 3.13 + FastAPI + uvicorn)
  # ---------------------------------------------------------------------------
  sentinel-ai:
    name: Sentinel-AI – Lint, Test & Import Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: sentinel-ai

    steps:
      # -----------------------------------------------------------------------
      # Step 1 – Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Step 2 – Set up Python 3.13
      # Matches the exact version in sentinel-ai/Dockerfile (python:3.13-slim).
      # pip cache is keyed on requirements.txt so it is only invalidated when
      # dependencies actually change.
      # -----------------------------------------------------------------------
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: sentinel-ai/requirements.txt

      # -----------------------------------------------------------------------
      # Step 3 – Install production dependencies
      # Installs fastapi, uvicorn, and requests from requirements.txt.
      # -----------------------------------------------------------------------
      - name: Install production dependencies
        run: pip install --no-cache-dir -r requirements.txt

      # -----------------------------------------------------------------------
      # Step 4 – Install dev/lint tooling
      # flake8 + pytest are not listed in requirements.txt (they are dev-only),
      # so they are installed explicitly here.
      # httpx is the async test client required by FastAPI's TestClient.
      # -----------------------------------------------------------------------
      - name: Install dev tooling (flake8, pytest, httpx)
        run: pip install --no-cache-dir flake8 pytest httpx

      # -----------------------------------------------------------------------
      # Step 5 – Lint with flake8
      # --max-line-length 120: matches a reasonable project standard.
      # --extend-ignore E501: redundant with max-line-length but explicit.
      # A non-zero exit code fails the job.
      # -----------------------------------------------------------------------
      - name: Lint with flake8
        run: |
          flake8 . \
            --max-line-length 120 \
            --exclude __pycache__,*.pyc

      # -----------------------------------------------------------------------
      # Step 6 – Run pytest
      # The recovery-engine test file (test_recovery.py) lives one level up, so
      # PYTHONPATH is extended to include both sentinel-ai and recovery-engine.
      # pytest --tb=short keeps failure output concise in the Actions log.
      # -----------------------------------------------------------------------
      - name: Run pytest
        working-directory: ${{ github.workspace }}
        run: |
          PYTHONPATH=sentinel-ai:recovery-engine \
          pytest recovery-engine/test_recovery.py \
            --tb=short \
            -v

      # -----------------------------------------------------------------------
      # Step 7 – Import smoke-test
      # Confirms every module in sentinel-ai can be imported without a runtime
      # error (catches circular imports, missing __init__, typos, etc.).
      # The working-directory is sentinel-ai so relative imports resolve.
      # -----------------------------------------------------------------------
      - name: Import smoke-test
        working-directory: ${{ github.workspace }}/sentinel-ai
        run: |
          PYTHONPATH=.:../recovery-engine \
          python -c "
          import analyzer
          import logger
          # main imports recovery engine – test the import chain end-to-end
          import sys, os
          sys.path.insert(0, os.path.abspath('../recovery-engine'))
          import recovery
          print('All sentinel-ai modules imported successfully')
          "

  # ---------------------------------------------------------------------------
  # JOB 3 – Recovery Engine (Python stubs)
  # ---------------------------------------------------------------------------
  recovery-engine:
    name: Recovery Engine – Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: recovery-engine

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: sentinel-ai/requirements.txt

      - name: Install dev tooling
        run: pip install --no-cache-dir flake8 pytest

      # -----------------------------------------------------------------------
      # Lint the recovery engine with the same flake8 settings.
      # -----------------------------------------------------------------------
      - name: Lint with flake8
        run: |
          flake8 . \
            --max-line-length 120 \
            --exclude __pycache__,*.pyc

      # -----------------------------------------------------------------------
      # Run the unit tests that verify restart/scale/rollback stub responses.
      # -----------------------------------------------------------------------
      - name: Run recovery tests
        run: pytest test_recovery.py --tb=short -v

  # ---------------------------------------------------------------------------
  # JOB 4 – CI gate
  # A single job that downstream workflows depend on.  If either matrix job
  # fails, this job fails too, giving cd.yml and docker-build.yml one clean
  # needs: [ci-status] expression instead of listing every job.
  # ---------------------------------------------------------------------------
  ci-status:
    name: CI Gate
    runs-on: ubuntu-latest
    needs:
      - frontend
      - sentinel-ai
      - recovery-engine
    # Run even when a dependency job is skipped (e.g. path filters), but fail
    # when any dependency actually failed.
    if: always()
    steps:
      - name: Evaluate CI result
        run: |
          echo "frontend:         ${{ needs.frontend.result }}"
          echo "sentinel-ai:      ${{ needs.sentinel-ai.result }}"
          echo "recovery-engine:  ${{ needs.recovery-engine.result }}"

          if [[ "${{ needs.frontend.result }}"        != "success" ]] || \
             [[ "${{ needs.sentinel-ai.result }}"     != "success" ]] || \
             [[ "${{ needs.recovery-engine.result }}" != "success" ]]; then
            echo "::error::One or more CI jobs failed. Blocking downstream workflows."
            exit 1
          fi

          echo "All CI jobs passed."
